<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements | All Saints' Cathedral Abayi-Umuocham</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sticky Navbar Injection Point -->
  <div id="header-root"></div>

  <!-- Hero Section -->
  <section class="hero">
    <div class="glow-bg" style="top: 10%; left: 15%; background: var(--primary-orange);"></div>
    <div class="container" style="position: relative; z-index: 10; display: flex; flex-direction: column; gap: 16px; max-width: 800px;">
      <span class="badge badge-green" style="margin: 0 auto;">Parish Bulletins</span>
      <h1 style="font-family: var(--font-serif); font-size: 48px; font-weight: 800;">
        Weekly Announcements
      </h1>
      <p style="font-size: 14px; color: #E2E8F0; max-width: 600px; margin: 0 auto;">
        Stay up to date with the latest notices, activities, synod outlines, and thanksgivings.
      </p>
    </div>
  </section>

  <!-- Filter & Search -->
  <section class="section-padding" style="padding-bottom: 20px; background-color: var(--bg-white);">
    <div class="container" style="display: flex; flex-direction: column; gap: 20px;">
      <input type="text" id="search-input" placeholder="Search notices and announcements…" style="width: 100%; padding: 16px 20px; border: 1.5px solid var(--border-light); border-radius: var(--radius); font-size: 14px; outline: none;">
      
      <div style="display: flex; gap: 10px; flex-wrap: wrap;" id="category-filters">
        <!-- Will be filled in with categories -->
      </div>
    </div>
  </section>

  <!-- Announcements List -->
  <section class="section-padding" style="background-color: var(--bg-grey);">
    <div class="container" style="max-width: 800px; display: flex; flex-direction: column; gap: 24px;" id="announcements-container">
      <!-- Filled in dynamically -->
    </div>
  </section>

  <!-- Footer Injection Point -->
  <div id="footer-root"></div>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    const CATEGORIES = ['All', 'Worship', 'Events', 'Baptism', 'Weddings', 'Thanksgiving', 'Youth', 'Men', 'Women', 'Finance', 'General'];
    let activeCat = 'All';
    let searchQuery = '';

    document.addEventListener('DOMContentLoaded', () => {
      // 1. Populate category filters
      const filterDiv = document.getElementById('category-filters');
      if (filterDiv) {
        filterDiv.innerHTML = CATEGORIES.map(c => `
          <button class="btn ${c === activeCat ? 'btn-primary' : 'btn-outline'}" 
                  id="cat-btn-${c.replace(' ', '')}" 
                  onclick="filterCategory('${c}')" 
                  style="padding: 8px 16px; font-size: 11px; font-family: var(--font-sans);">${c}</button>
        `).join('');
      }

      renderAnnouncements();

      // Search handler
      document.getElementById('search-input').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderAnnouncements();
      });
    });

    function filterCategory(cat) {
      activeCat = cat;
      CATEGORIES.forEach(c => {
        const btn = document.getElementById('cat-btn-' + c.replace(' ', ''));
        if (btn) {
          if (c === cat) {
            btn.className = 'btn btn-primary';
          } else {
            btn.className = 'btn btn-outline';
          }
        }
      });
      renderAnnouncements();
    }

    function renderAnnouncements() {
      const container = document.getElementById('announcements-container');
      if (!container) return;

      const list = window.CathedralDB.getAnnouncements();
      
      const filtered = list.filter(a => {
        const matchesCat = activeCat === 'All' || a.category === activeCat;
        const matchesSearch = a.title.toLowerCase().includes(searchQuery) || 
                            a.content.toLowerCase().includes(searchQuery);
        return matchesCat && matchesSearch;
      });

      // Sort pinned first
      const sorted = [...filtered].sort((x, y) => (y.isPinned ? 1 : 0) - (x.isPinned ? 1 : 0));

      if (sorted.length === 0) {
        container.innerHTML = `
          <div class="card text-center" style="padding: 40px;">
            <p style="color: var(--text-light); font-size: 14px;">No active announcements match your criteria.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = sorted.map(a => `
        <div class="card" style="border-left: 6px solid ${a.isPinned ? 'var(--primary-orange)' : 'var(--primary-blue)'}; padding: 24px 32px;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;">
            ${a.isPinned ? `<span class="badge badge-orange" style="font-size: 8px; padding: 2px 8px;">📌 Pinned Notice</span>` : ''}
            <span class="badge badge-green" style="font-size: 8px; padding: 2px 8px;">${a.category}</span>
            <span style="font-size: 11px; color: var(--text-light); margin-left: auto;">📅 ${new Date(a.date).toLocaleDateString('en-NG', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
          </div>
          <h3 style="font-size: 18px; margin-bottom: 10px;">${a.title}</h3>
          <p style="font-size: 13px; line-height: 1.6; color: var(--text-slate);">${a.content}</p>
          
          <div style="margin-top: 16px; padding-top: 12px; border-top: 1.5px solid var(--border-light); font-size: 10px; color: var(--text-light);">
            Valid until: <span style="font-weight: 700;">${new Date(a.expiryDate).toLocaleDateString('en-NG', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
